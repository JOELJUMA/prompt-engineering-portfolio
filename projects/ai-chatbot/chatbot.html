<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot Demo</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
    input, button { padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<h2>AI Chatbot (Prompt-Based Demo)</h2>

<div id="chat"></div>

<input type="text" id="userInput" placeholder="Ask something..." />
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage() {
  let input = document.getElementById("userInput").value;
  let chat = document.getElementById("chat");

  let userMsg = "<p><b>You:</b> " + input + "</p>";
  
  // Simulated AI response (Prompt engineered style)
  let aiResponse = "<p><b>AI:</b> Here's a structured answer:<br>- Think about the problem<br>- Break it into steps<br>- Apply a solution<br>- Review your result</p>";

  chat.innerHTML += userMsg + aiResponse;
}
</script>

</body>
</html>
